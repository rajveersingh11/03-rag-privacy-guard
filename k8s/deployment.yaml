apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegisvault-api
  namespace: aegisvault
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aegisvault-api
  template:
    metadata:
      labels:
        app: aegisvault-api
    spec:
      containers:
        - name: api
          image: aegisvault-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: aegisvault-secrets
          env:
            - name: APP_ENV
              value: "production"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /live
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aegisvault-api-pdb
  namespace: aegisvault
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: aegisvault-api
