# ============================================================
# AegisVault — Environment & Path Configuration
# Infrastructure settings. Secrets come from .env
# ============================================================

app:
  name: "AegisVault"
  version: "1.0.0"
  host: "0.0.0.0"
  port: 8000
  debug: false

paths:
  data_dir: "./data"
  chroma_dir: "./data/chroma_db"
  quarantine_dir: "./data/quarantine"
  audit_log_dir: "./data/audit_logs"

database:
  url: "${DATABASE_URL}"
  pool_size: 10
  echo: false

api:
  key_header: "X-API-Key"
  rate_limit: 60